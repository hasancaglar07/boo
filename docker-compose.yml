version: '3.8'

services:
  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: boo-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    env_file:
      - .env.local
    volumes:
      - ./web/public:/app/public
    networks:
      - boo-network
    depends_on:
      - dashboard

  # Python Dashboard Server
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: boo-dashboard
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - BOOK_DASHBOARD_HOST=0.0.0.0
      - BOOK_DASHBOARD_PORT=8765
    env_file:
      - .env.local
    volumes:
      - ./book_outputs:/app/book_outputs
      - ./multi_provider_logs:/app/multi_provider_logs
    networks:
      - boo-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: boo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - boo-network
    depends_on:
      - web
      - dashboard

networks:
  boo-network:
    driver: bridge

volumes:
  book_outputs:
  multi_provider_logs:
