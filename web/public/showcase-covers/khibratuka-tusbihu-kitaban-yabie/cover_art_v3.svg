<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1920" viewBox="0 0 1200 1920" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(105, 70, 84)" />
      <stop offset="52%" stop-color="rgb(43, 21, 34)" />
      <stop offset="100%" stop-color="rgb(12, 8, 14)" />
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="10%" r="60%">
      <stop offset="0%" stop-color="rgba(242, 157, 183, 0.38)" />
      <stop offset="100%" stop-color="rgba(242, 157, 183, 0)" />
    </radialGradient>
    <linearGradient id="veil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,9,16,0.1)" />
      <stop offset="60%" stop-color="rgba(5,8,14,0.04)" />
      <stop offset="100%" stop-color="rgba(3,4,8,0.24)" />
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="128%" height="128%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="rgba(1,4,10,0.42)" />
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="8" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0 0.04" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="1920" fill="url(#bg)" />
  <rect width="1200" height="1920" fill="url(#glow)" />
  
    <g filter="url(#soft-shadow)">
      <ellipse cx="871" cy="420" rx="300" ry="230" fill="rgba(0, 0, 0, 0.18)" />
      <path d="M520 340 C650 200, 900 200, 1030 360" stroke="rgba(0, 0, 0, 0.42)" stroke-width="14" stroke-linecap="round" fill="none" />
      <path d="M560 420 C690 300, 870 300, 980 432" stroke="rgba(0, 0, 0, 0.28)" stroke-width="10" stroke-linecap="round" fill="none" />
      <rect x="240" y="952" width="360" height="180" rx="28" fill="rgba(0, 0, 0, 0.76)" />
      <rect x="530" y="860" width="300" height="220" rx="28" fill="rgba(0, 0, 0, 0.72)" />
      <rect x="770" y="762" width="220" height="260" rx="28" fill="rgba(0, 0, 0, 0.68)" />
      <rect x="820" y="754" width="10" height="520" fill="rgba(242, 157, 183, 0.7)" />
      <polygon points="710,1160 1060,840 1140,1080 840,1430" fill="rgba(0, 0, 0, 0.14)" />
    </g>
    <circle cx="801" cy="412" r="112" fill="rgba(0, 0, 0, 0.12)" />
  
  <rect width="1200" height="1920" fill="url(#veil)" />
  <rect width="1200" height="1920" filter="url(#grain)" opacity="0.55" />
