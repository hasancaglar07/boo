<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1920" viewBox="0 0 1200 1920" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(106, 96, 56)" />
      <stop offset="52%" stop-color="rgb(47, 38, 16)" />
      <stop offset="100%" stop-color="rgb(13, 12, 10)" />
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="10%" r="60%">
      <stop offset="0%" stop-color="rgba(245, 218, 115, 0.38)" />
      <stop offset="100%" stop-color="rgba(245, 218, 115, 0)" />
    </radialGradient>
    <linearGradient id="veil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,9,16,0.1)" />
      <stop offset="60%" stop-color="rgba(5,8,14,0.04)" />
      <stop offset="100%" stop-color="rgba(3,4,8,0.24)" />
    </linearGradient>
    <filter id="soft-shadow" x="-12%" y="-12%" width="128%" height="128%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="rgba(1,4,10,0.42)" />
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="8" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0 0.04" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="1920" fill="url(#bg)" />
  <rect width="1200" height="1920" fill="url(#glow)" />
  
    <g filter="url(#soft-shadow)">
      <circle cx="801" cy="420" r="280" fill="rgba(0, 0, 0, 0.18)" />
      <circle cx="816" cy="420" r="220" fill="rgba(0, 0, 0, 0.22)" />
      <rect x="551" y="860" width="240" height="760" rx="28" fill="rgba(0, 0, 0, 0.72)" />
      <rect x="736" y="760" width="12" height="860" fill="rgba(245, 218, 115, 0.8)" />
      <rect x="761" y="980" width="180" height="540" rx="24" fill="rgba(0, 0, 0, 0.66)" />
      <polygon points="361,620 591,520 791,980 511,1140" fill="rgba(0, 0, 0, 0.18)" />
    </g>
    <g opacity="0.28">
      <rect x="120" y="144" width="960" height="2" fill="rgba(245, 218, 115, 0.34)" />
      <rect x="120" y="1772" width="960" height="2" fill="rgba(245, 218, 115, 0.24)" />
      <rect x="1080" y="184" width="2" height="1460" fill="rgba(245, 218, 115, 0.22)" />
    </g>
  
  <rect width="1200" height="1920" fill="url(#veil)" />
  <rect width="1200" height="1920" filter="url(#grain)" opacity="0.55" />
</svg>